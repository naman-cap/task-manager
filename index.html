<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Board — CapDoc</title>
  <meta name="description" content="Daily task tracking board for the CapDoc team. Track tasks, doc tickets, and statuses for each team member." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>(function(){var t=localStorage.getItem('tbTheme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">TM</div>
        <div class="logo-text">
          <span class="logo-title">Task Board</span>
          <span class="logo-sub">CapDoc Team</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="home" id="nav-home">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <path d="M3 10L10 3L17 10V17H13V13H7V17H3V10Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          <span>Overview</span>
        </button>

        <div class="nav-section-label">Team</div>

        <button class="nav-item" data-view="neeraj" id="nav-neeraj">
          <div class="member-dot" style="background: var(--accent-neeraj)"></div>
          <span>Neeraj</span>
        </button>
        <button class="nav-item" data-view="divya" id="nav-divya">
          <div class="member-dot" style="background: var(--accent-divya)"></div>
          <span>Divya</span>
        </button>
        <button class="nav-item" data-view="madhurima" id="nav-madhurima">
          <div class="member-dot" style="background: var(--accent-madhurima)"></div>
          <span>Madhurima</span>
        </button>
        <button class="nav-item" data-view="george" id="nav-george">
          <div class="member-dot" style="background: var(--accent-george)"></div>
          <span>George</span>
        </button>
        <button class="nav-item" data-view="naman" id="nav-naman">
          <div class="member-dot" style="background: var(--accent-naman)"></div>
          <span>Naman</span>
        </button>
        <button class="nav-item" data-view="jira-bot" id="nav-jira-bot">
          <div class="member-dot" style="background: var(--accent-jira-bot)"></div>
          <span>JIRA Bot</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 20 20" fill="none" width="14" height="14">
            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.22 3.22l1.42 1.42M15.36 15.36l1.42 1.42M3.22 16.78l1.42-1.42M15.36 4.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="theme-label">Dark mode</span>
        </button>
        <div class="jira-sync-row">
          <div id="jira-sync-status" class="jira-sync-status"></div>
          <button id="jira-sync-btn" class="jira-sync-btn" title="Sync Jira now" aria-label="Sync Jira now">
            <svg viewBox="0 0 16 16" fill="none" width="12" height="12">
              <path d="M13.5 2.5A6.5 6.5 0 003 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M2.5 13.5A6.5 6.5 0 0013 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M11 1l2.5 1.5L12 5M5 15l-2.5-1.5L4 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="last-updated" id="last-updated-sidebar"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">

      <!-- HOME VIEW -->
      <div class="view active" id="view-home">
        <div class="view-header">
          <div class="view-title-block">
            <h1 class="view-title">Good morning, team</h1>
            <p class="view-subtitle">Here's how the board looks today</p>
          </div>
          <div class="header-date" id="header-date"></div>
        </div>

        <div class="home-stats-grid" id="home-stats">
          <!-- Stats cards injected by JS -->
        </div>

        <div class="home-team-summary" id="home-team-summary">
          <!-- Team task summaries injected by JS -->
        </div>
      </div>

      <!-- MEMBER VIEWS (generated by JS) -->
      <div class="view" id="view-neeraj" data-member="neeraj"></div>
      <div class="view" id="view-divya" data-member="divya"></div>
      <div class="view" id="view-madhurima" data-member="madhurima"></div>
      <div class="view" id="view-george" data-member="george"></div>
      <div class="view" id="view-naman" data-member="naman"></div>
      <div class="view" id="view-jira-bot" data-member="jira-bot"></div>

    </main>
  </div>

  <!-- Mobile sidebar toggle -->
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
    <svg viewBox="0 0 20 20" fill="none">
      <path d="M3 5H17M3 10H17M3 15H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

  <div class="mobile-overlay" id="mobile-overlay"></div>

  <!-- Custom Modal Overlay -->
  <div id="custom-modal-overlay" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-content">
        <h3 id="modal-title">Confirm Action</h3>
        <p id="modal-message">Are you sure you want to proceed?</p>
        <div class="modal-actions">
          <button id="modal-cancel-btn" class="modal-btn secondary">Cancel</button>
          <button id="modal-confirm-btn" class="modal-btn primary">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
